apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-vnf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-vnf
  template:
    metadata:
      labels:
        app: nginx-vnf
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"